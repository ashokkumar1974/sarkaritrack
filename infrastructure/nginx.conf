# See file 29-nginx-docker-requirements.conf for full nginx config
# This is a placeholder - copy content from that file
user nginx;
worker_processes auto;
events { worker_connections 4096; }
http {
  include /etc/nginx/mime.types;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;

  server {
    listen 80;
    server_name sarkaritrack.in www.sarkaritrack.in;
    return 301 https://sarkaritrack.in$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name sarkaritrack.in;
    # ssl_certificate /etc/letsencrypt/live/sarkaritrack.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sarkaritrack.in/privkey.pem;
    location / {
      proxy_pass http://web:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
      proxy_pass http://api:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
